# Deploy lên VPS: docker compose --env-file .env.production up -d --build
#
# Compose không tự đọc .env.production (nó chỉ tự đọc file tên ".env"), nên cờ
# --env-file là bắt buộc. Thiếu cờ này container sẽ chạy với config rỗng và
# fail ngay ở bước kiểm tra Jwt:SecretKey.
#
# CI/CD: .env.production bị .gitignore chặn nên KHÔNG có trong bản clone của
# Jenkins. Giữ một bản gốc trên VPS ngoài workspace (vd
# /opt/vni-automation/.env.production) rồi copy vào trước khi build — xem
# docs/DEPLOY_VPS.md mục Jenkins. Đừng gỡ nó khỏi .gitignore để tiện.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vni-automation:latest
    container_name: vni-automation
    restart: unless-stopped

    # Nạp toàn bộ biến trong file env vào container.
    env_file:
      - .env.production

    ports:
      # Mặc định chỉ mở trên loopback — TLS do reverse proxy (nginx/Caddy) của
      # VPS đảm nhiệm.
      # Chưa dựng proxy và cần vào bằng IP để test thì đặt APP_BIND=0.0.0.0
      # trong .env.production. Lưu ý lúc đó là HTTP trần: Threads OAuth sẽ
      # không chạy vì Threads bắt buộc HTTPS.
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8080}:8080"

    volumes:
      # SQLite và file upload phải nằm ngoài container, nếu không mỗi lần
      # `up --build` là mất sạch dữ liệu, kể cả token của các kênh đã kết nối.
      - vni-data:/app/Data
      - vni-storage:/app/Storage/Files

    healthcheck:
      # curl được cài thêm trong Dockerfile — image asphet gốc không có sẵn
      # curl lẫn wget, dùng thẳng sẽ khiến healthcheck luôn fail.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  vni-data:
  vni-storage:
